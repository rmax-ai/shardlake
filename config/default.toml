storage_root = "./data"
num_shards = 4
kmeans_iters = 20
nprobe = 2
kmeans_seed = 3735928559
candidate_shards = 0
max_vectors_per_shard = 0
pq_enabled = false
pq_num_subspaces = 8
pq_codebook_size = 256
shard_cache_capacity = 128
# kmeans_sample_size is unset (absent = None).  When absent, all vectors are
# used for centroid training.  Set to a positive integer to train centroids
# from a random sample of that many vectors instead (e.g. 50000).
# kmeans_sample_size = 50000

# prefetch: optional shard warming based on query frequency.
# When enabled, shards probed at least min_query_count times are warmed into
# the cache proactively on the next cache-miss load event.
[prefetch]
enabled = false
min_query_count = 3
