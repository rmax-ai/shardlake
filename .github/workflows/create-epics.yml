              pub fn build_parallel(
                  &self,
                  shards: Vec<ShardData>,
                  params: &BuildParams,
              ) -> Result<Vec<ShardIndex>, IndexError> {
                  shards
                      .into_par_iter()
                      .enumerate()
                      .map(|(i, data)| self.build_shard(i, data, params))
                      .collect()
              }
          }
          ```

          **Acceptance criteria:**
          - [ ] `build_parallel()` using `rayon::par_iter()`
          - [ ] `--parallel` flag on `build-index` command (default: true)
          - [ ] Benchmark: parallel build Ōēź 2├Ś faster than sequential on 4+ cores
          - [ ] Deterministic output with fixed seed

          ---

          ### Task 9.2 ŌĆö Distributed build mode

          Support splitting a dataset across multiple worker processes.

          **Design:**
          - Worker receives: dataset slice key range, shard assignment, build params
          - Worker writes its shard artifact to shared storage
          - Coordinator polls until all workers complete

          **CLI:**
          ```bash
          # Coordinator
          shardlake build-index --parallel --workers 4 --dataset-version ds-v1

          # Worker (invoked by coordinator via subprocess or job queue)
          shardlake build-shard \
            --shard-id 2 \
            --dataset-version ds-v1 \
            --build-params build-params.json
          ```

          **Acceptance criteria:**
          - [ ] `build-shard` sub-command for single-shard builds
          - [ ] Coordinator logic that spawns N worker processes
          - [ ] All shards written to storage; coordinator assembles final manifest
          - [ ] Documented in `docs/cli-reference.md`

          ---

          ### Task 9.3 ŌĆö Merge index shards

          After distributed builds, merge partial outputs into a single manifest.

          **Requirements:**
          - Validate all expected shards are present and checksums valid
          - Assemble index manifest from per-shard metadata
          - Publish merged manifest atomically

          **CLI:**
          ```bash
          shardlake merge-shards \
            --dataset-version ds-v1 \
            --index-version idx-v1 \
            --shard-dir ./partial-shards/
          ```

          **Acceptance criteria:**
          - [ ] `merge-shards` command
          - [ ] Validates completeness (no missing shards)
          - [ ] Writes final index manifest
          - [ ] Idempotent: re-running with same inputs produces same manifest

          ---

