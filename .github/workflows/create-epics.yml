name: Create Epic Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (echo issue bodies without creating)'
        required: false
        default: 'false'
        type: boolean

permissions:
  issues: write

jobs:
  create-epics:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Create labels
        run: |
          gh label create "epic" --color "8B5CF6" --description "Large feature epic" \
            --repo "$REPO" 2>/dev/null || true
          gh label create "roadmap" --color "0EA5E9" --description "Roadmap item" \
            --repo "$REPO" 2>/dev/null || true

      - name: Create parent umbrella issue
        id: parent
        run: |
          BODY=$(cat <<'ISSUE_BODY'
