          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN ŌĆö parent issue body:"
            echo "$BODY"
            echo "parent_number=0" >> "$GITHUB_OUTPUT"
          else
            URL=$(gh issue create \
              --repo "$REPO" \
              --title "Shardlake v1.x Roadmap ŌĆö 10 Engineering Epics" \
              --body "$BODY" \
              --label "epic" \
              --label "roadmap")
            NUMBER=$(echo "$URL" | grep -oE '[0-9]+$')
            echo "Created parent issue: #$NUMBER ($URL)"
            echo "parent_number=$NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Epic 1 ŌĆö Artifact and Dataset Lifecycle
        id: epic1
        run: |
          BODY=$(cat <<'ISSUE_BODY'
          ## Epic 1 ŌĆö Artifact and Dataset Lifecycle

          **Goal:** Make dataset, embeddings, and index artifacts first-class immutable objects
          with deterministic reproducibility.

          **Why this matters:** In large-scale vector systems the biggest operational failures
          are artifact drift and incompatible index versions.

          ---

          ### Task 1.1 ŌĆö Dataset manifest specification

          Define a canonical schema for dataset manifests.

          **Required fields:**
          - `dataset_id` ŌĆö unique identifier for the dataset
          - `dataset_version` ŌĆö semver/slug version string
          - `vector_dimension` ŌĆö dimensionality of embedding vectors
          - `distance_metric` ŌĆö `cosine | dot_product | euclidean`
          - `embedding_model` ŌĆö model name/URI used to generate embeddings
          - `embedding_version` ŌĆö version of the embedding model
          - `shard_count` ŌĆö number of shards
          - `record_count` ŌĆö total vector count
          - `artifact_locations` ŌĆö paths/keys to stored artifacts
          - `checksum` ŌĆö SHA-256 of the dataset artifact(s)

          **Relevant code:**
          ```rust
          // crates/shardlake-manifest/src/lib.rs
          // Current Manifest struct needs extension:

          #[derive(Debug, Clone, Serialize, Deserialize)]
          pub struct DatasetManifest {
              pub dataset_id: String,
              pub dataset_version: DatasetVersion,
              pub vector_dimension: usize,
              pub distance_metric: DistanceMetric,
              pub embedding_model: String,
              pub embedding_version: String,
              pub shard_count: usize,
              pub record_count: usize,
              pub artifact_locations: Vec<String>,
              pub checksum: String,           // SHA-256 hex
              pub created_at: DateTime<Utc>,
          }
          ```

          **Acceptance criteria:**
          - [ ] `DatasetManifest` struct with all required fields
          - [ ] JSON schema validation via `serde_json`
          - [ ] Unit tests for serialisation/deserialisation roundtrip
          - [ ] Integration with `shardlake ingest` command

          ---

          ### Task 1.2 ŌĆö Index manifest specification

          Define a schema for index artifacts.

          **Required fields:**
          - `index_version`
          - `dataset_version`
          - `build_timestamp`
          - `algorithm` ŌĆö `ivf | hnsw | exact | ivfpq`
          - `shard_metadata` ŌĆö per-shard details
          - `compression_method`
          - `quantization_parameters`
          - `recall_estimates`
          - `build_duration`

          **Compatibility checks:**
          - dimension match between dataset and index
          - dataset version match
          - algorithm compatibility with query config

          **Relevant code:**
          ```rust
          // crates/shardlake-manifest/src/lib.rs
          #[derive(Debug, Clone, Serialize, Deserialize)]
          pub struct IndexManifest {
              pub index_version: IndexVersion,
              pub dataset_version: DatasetVersion,
              pub build_timestamp: DateTime<Utc>,
              pub algorithm: IndexAlgorithm,
              pub shard_metadata: Vec<ShardMeta>,
              pub compression_method: CompressionMethod,
              pub quantization_parameters: Option<QuantizationParams>,
              pub recall_estimates: Option<RecallEstimates>,
              pub build_duration_secs: f64,
          }

          impl IndexManifest {
              pub fn check_compatibility(&self, dataset: &DatasetManifest) -> Result<(), ManifestError> {
                  // dimension match, dataset_version match, algorithm compat
              }
          }
          ```

          **Acceptance criteria:**
          - [ ] `IndexManifest` struct with all required fields
          - [ ] `check_compatibility()` method
          - [ ] Tests for compatibility validation (positive and negative cases)

          ---

          ### Task 1.3 ŌĆö Manifest integrity validation

          Add a CLI command: `shardlake validate-manifest`

          **Checks to perform:**
          - shard files exist in storage backend
          - shard metadata consistent with manifest
          - vector dimensions match across dataset and index manifests
          - artifact checksums valid (recompute and compare)

          **Relevant code:**
          ```rust
          // crates/shardlake-cli/src/commands/validate.rs
          pub async fn run(opts: ValidateOpts, store: Arc<dyn ObjectStore>) -> anyhow::Result<()> {
              let manifest = Manifest::load(&store, &opts.index_version).await?;
              manifest.validate(&store).await?;
              tracing::info!("Manifest validation passed");
              Ok(())
          }
          ```

          **Acceptance criteria:**
          - [ ] `shardlake validate-manifest --index-version <v>` command
          - [ ] Checksum recomputation and comparison
          - [ ] Human-readable validation report output

          ---

          ### Task 1.4 ŌĆö Deterministic artifact builds

          **Requirements:**
          - Pin RNG seeds for reproducible K-means initialisation
          - Log all algorithm parameters at build time
          - Write build metadata to manifest (seed, parameters, duration)

          **Relevant code:**
          ```rust
          // crates/shardlake-index/src/builder.rs
          pub struct BuildParams {
              pub num_shards: usize,
              pub metric: DistanceMetric,
              pub kmeans_iterations: usize,
              pub seed: u64,             // NEW: pin for determinism
              pub log_params: bool,      // NEW: emit structured log of all params
          }
          ```

          **Acceptance criteria:**
          - [ ] `--seed` flag on `build-index` command
          - [ ] Deterministic output: two builds with same seed produce identical artifacts
          - [ ] Build metadata written to manifest

          ---

          ### Task 1.5 ŌĆö Artifact registry abstraction

          Implement a local artifact registry with a structured layout:

          ```
          artifacts/
          Ōö£ŌöĆŌöĆ datasets/
          Ōöé   ŌööŌöĆŌöĆ <dataset_id>/<version>/
          Ōö£ŌöĆŌöĆ indexes/
          Ōöé   ŌööŌöĆŌöĆ <index_version>/shards/
          ŌööŌöĆŌöĆ manifests/
              Ōö£ŌöĆŌöĆ dataset/
              ŌööŌöĆŌöĆ index/
          ```

          **Trait abstraction:**
          ```rust
          // crates/shardlake-storage/src/registry.rs
          #[async_trait]
          pub trait ArtifactRegistry: Send + Sync {
              async fn put_dataset(&self, id: &str, version: &str, data: Bytes) -> Result<()>;
              async fn get_dataset(&self, id: &str, version: &str) -> Result<Bytes>;
              async fn put_index_shard(&self, version: &str, shard_id: usize, data: Bytes) -> Result<()>;
              async fn list_indexes(&self) -> Result<Vec<String>>;
          }
          ```

          **Acceptance criteria:**
          - [ ] `LocalArtifactRegistry` implementing the trait
          - [ ] Directory structure created automatically on first write
          - [ ] Unit tests for all registry operations
          ISSUE_BODY
          )
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN ŌĆö Epic 1 issue body (truncated):"
            echo "$BODY" | head -20
          else
            URL=$(gh issue create \
              --repo "$REPO" \
              --title "Epic 1 ŌĆö Artifact and Dataset Lifecycle" \
              --body "$BODY" \
              --label "epic")
            NUMBER=$(echo "$URL" | grep -oE '[0-9]+$')
            echo "Created Epic 1: #$NUMBER"
            # Link as sub-issue of parent
            PARENT=${{ steps.parent.outputs.parent_number }}
            if [ "$PARENT" != "0" ] && [ -n "$PARENT" ]; then
              CHILD_NUM="$NUMBER"
              gh api --method POST \
                "/repos/$REPO/issues/$PARENT/sub-issues" \
                -f sub_issue_id="$CHILD_NUM" 2>/dev/null || true
            fi
          fi

      - name: Create Epic 2 ŌĆö Shard Routing and Partitioning
        id: epic2
        run: |
          BODY=$(cat <<'ISSUE_BODY'
          ## Epic 2 ŌĆö Shard Routing and Partitioning

          **Goal:** Improve the vector partitioning strategy to reduce query fan-out and improve latency.

          ---

          ### Task 2.1 ŌĆö Implement vector clustering

          Use k-means clustering to partition vectors into shards with high intra-cluster similarity.

          **Requirements:**
          - Train centroids using a sample subset of the dataset (configurable fraction)
          - Assign every vector to its nearest centroid at build time
          - Store centroid metadata in the index manifest

          **Relevant code:**
          ```rust
          // crates/shardlake-index/src/kmeans.rs  (already exists)
          // Extend KMeans with:
          pub struct ClusteringResult {
              pub centroids: Vec<Vec<f32>>,   // k ├Ś dim
              pub assignments: Vec<usize>,    // vector ŌåÆ centroid id
              pub inertia: f64,               // sum of squared distances
          }

          impl KMeans {
              pub fn fit_sample(&self, vectors: &[Vec<f32>], sample_frac: f32) -> ClusteringResult { ... }
          }
          ```

          **Acceptance criteria:**
          - [ ] `fit_sample()` method on `KMeans`
          - [ ] Centroid vectors persisted to object store
          - [ ] Unit tests: clustering produces expected number of centroids

          ---

          ### Task 2.2 ŌĆö Centroid routing logic

          At query time, compute the nearest centroids to the query vector and route only to those shards.

          **Requirements:**
          - Compute distance from query to all centroids
          - Select top-N centroids (configurable `candidate_centroids`)
          - Return the shard IDs associated with those centroids

          **Relevant code:**
          ```rust
          // crates/shardlake-index/src/searcher.rs
          impl IndexSearcher {
              pub fn route_to_shards(
                  &self,
                  query: &[f32],
                  candidate_centroids: usize,
              ) -> Vec<ShardId> {
                  // compute nearest centroids ŌåÆ return shard ids
              }
          }
          ```

          **Acceptance criteria:**
          - [ ] `route_to_shards()` method
          - [ ] Unit test: routing returns correct shard set for a known query
          - [ ] Integration: query fan-out reduced vs. searching all shards

          ---

          ### Task 2.3 ŌĆö Shard metadata format

          Each shard must include structured metadata:

          ```rust
          #[derive(Debug, Clone, Serialize, Deserialize)]
          pub struct ShardMeta {
              pub shard_id: ShardId,
              pub centroid_id: usize,
              pub vector_count: usize,
              pub index_type: IndexAlgorithm,
              pub file_location: String,   // object store key
              pub size_bytes: u64,
              pub checksum: String,        // SHA-256
          }
          ```

          **Acceptance criteria:**
          - [ ] `ShardMeta` struct in manifest crate
          - [ ] Written during `build-index` and loaded at serve time
          - [ ] Validated during `validate-manifest`

          ---

          ### Task 2.4 ŌĆö Query fan-out policy

          Implement configurable fan-out parameters via `SystemConfig` or per-query override:

          ```toml
          [query]
          candidate_centroids = 4
          candidate_shards = 4
          max_vectors_per_shard = 50_000
          ```

          **Acceptance criteria:**
          - [ ] Config fields in `SystemConfig` or `QueryConfig`
          - [ ] Per-query override via HTTP request body
          - [ ] Documented in `docs/configuration.md`

          ---

          ### Task 2.5 ŌĆö Partition evaluation harness

          Add CLI command: `shardlake evaluate-partitioning`

          **Metrics to compute:**
          - Shard size distribution (min/max/mean/stddev vector counts)
          - Routing accuracy (fraction of relevant vectors in top-N shards)
          - Recall impact (recall@k with limited vs. full fan-out)
          - Shard hotness (query frequency per shard)

          **Acceptance criteria:**
          - [ ] `shardlake evaluate-partitioning --dataset-version <v> --index-version <v>` command
          - [ ] JSON or table output with all metrics
          - [ ] Documented in `docs/cli-reference.md`
          ISSUE_BODY
          )
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN ŌĆö Epic 2 issue body (truncated):"
            echo "$BODY" | head -10
          else
            URL=$(gh issue create \
              --repo "$REPO" \
              --title "Epic 2 ŌĆö Shard Routing and Partitioning" \
              --body "$BODY" \
              --label "epic")
            NUMBER=$(echo "$URL" | grep -oE '[0-9]+$')
            echo "Created Epic 2: #$NUMBER"
            PARENT=${{ steps.parent.outputs.parent_number }}
            if [ "$PARENT" != "0" ] && [ -n "$PARENT" ]; then
              CHILD_NUM="$NUMBER"
              gh api --method POST \
                "/repos/$REPO/issues/$PARENT/sub-issues" \
                -f sub_issue_id="$CHILD_NUM" 2>/dev/null || true
            fi
          fi

      - name: Create Epic 3 ŌĆö ANN Index Algorithms
        id: epic3
        run: |
          BODY=$(cat <<'ISSUE_BODY'
          ## Epic 3 ŌĆö ANN Index Algorithms

          **Goal:** Introduce real approximate nearest neighbor methods beyond brute-force shards.

          ---

          ### Task 3.1 ŌĆö Implement IVF index

          Inverted File Index (IVF) organises vectors into clusters; at query time only a subset
          of clusters (posting lists) are scanned.

          **Requirements:**
          - Train a coarse quantizer (k-means centroids)
          - Assign vectors to clusters, store posting lists
          - At query time, probe `nprobe` nearest centroids

          **Relevant code:**
          ```rust
          // crates/shardlake-index/src/ivf.rs  (new file)
          pub struct IvfIndex {
              pub centroids: Vec<Vec<f32>>,   // k_coarse ├Ś dim
              pub posting_lists: Vec<Vec<(VectorId, Vec<f32>)>>,
              pub metric: DistanceMetric,
          }

          impl IvfIndex {
              pub fn build(vectors: &[(VectorId, Vec<f32>)], k: usize, metric: DistanceMetric) -> Self { ... }
              pub fn search(&self, query: &[f32], top_k: usize, nprobe: usize) -> Vec<SearchResult> { ... }
          }
          ```

          **Acceptance criteria:**
          - [ ] `IvfIndex::build()` and `IvfIndex::search()` methods
          - [ ] Unit tests: recall@10 Ōēź 0.8 on synthetic data with nprobe = k/2
          - [ ] `build-index --algorithm ivf` flag

          ---

          ### Task 3.2 ŌĆö Implement PQ compression

          Product Quantization (PQ) compresses vectors by splitting them into sub-vectors
          and encoding each sub-vector with a small codebook.

          **Requirements:**
          - Configurable number of sub-quantizers (`m`) and bits per code (`nbits`)
          - Store PQ codes instead of raw f32 vectors
          - Asymmetric distance computation (ADC) at search time

          **Relevant code:**
          ```rust
          // crates/shardlake-index/src/pq.rs  (new file)
          pub struct ProductQuantizer {
              pub m: usize,          // number of sub-quantizers
              pub nbits: usize,      // bits per code (typically 8)
              pub codebooks: Vec<Vec<Vec<f32>>>,   // m ├Ś k_sub ├Ś (dim/m)
          }

          impl ProductQuantizer {
              pub fn train(vectors: &[Vec<f32>], m: usize, nbits: usize) -> Self { ... }
              pub fn encode(&self, vector: &[f32]) -> Vec<u8> { ... }
              pub fn decode(&self, code: &[u8]) -> Vec<f32> { ... }
              pub fn asymmetric_distance(&self, query: &[f32], code: &[u8]) -> f32 { ... }
          }
          ```

          **Acceptance criteria:**
          - [ ] `ProductQuantizer` with train/encode/decode/asymmetric_distance
          - [ ] Compression ratio Ōēź 8├Ś vs raw f32 for default params
          - [ ] Unit tests for encode/decode roundtrip error bounds

          ---

          ### Task 3.3 ŌĆö Candidate retrieval pipeline

          Build a modular, composable query pipeline:

          ```
          query vector
            ŌåÆ centroid routing (IVF coarse quantizer)
            ŌåÆ IVF candidate selection (probe nprobe lists)
            ŌåÆ PQ approximate distance computation
            ŌåÆ top-K heap selection
            ŌåÆ optional exact rerank
          ```

          **Relevant code:**
          ```rust
          // crates/shardlake-index/src/pipeline.rs  (new file)
          pub struct QueryPipeline {
              ivf: IvfIndex,
              pq: Option<ProductQuantizer>,
              reranker: Option<ExactReranker>,
          }

          impl QueryPipeline {
              pub fn search(&self, query: &[f32], params: &QueryParams) -> Vec<SearchResult> { ... }
          }
          ```

          **Acceptance criteria:**
          - [ ] `QueryPipeline` struct implementing the full candidate pipeline
          - [ ] Each stage individually testable
          - [ ] Pipeline stages configurable at runtime

          ---

          ### Task 3.4 ŌĆö Exact reranking

          After approximate candidate selection, fetch raw vectors and compute exact distances
          for the top-M candidates, then re-sort.

          **Requirements:**
          - Configurable `rerank_limit` parameter
          - Fetch raw vectors from shard storage
          - Compute exact distance (same metric as index)

          **Acceptance criteria:**
          - [ ] `ExactReranker` struct
          - [ ] Improves recall@k when enabled (measurable in benchmarks)
          - [ ] `--rerank-limit` flag on `serve` command

          ---

          ### Task 3.5 ŌĆö Recall evaluation command

          Add CLI command: `shardlake eval-ann`

          **Metrics:**
          - recall@k (fraction of true top-k returned)
          - precision@k
          - mean query latency
          - P50/P95/P99 latency

          **Acceptance criteria:**
          - [ ] `shardlake eval-ann --k 10 --nprobe 8 --queries <file>` command
          - [ ] Compares approximate results against exact ground truth
          - [ ] JSON report output
          - [ ] Documented in `docs/cli-reference.md`
          ISSUE_BODY
          )
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN ŌĆö Epic 3 (skipped)"
          else
            URL=$(gh issue create \
              --repo "$REPO" \
              --title "Epic 3 ŌĆö ANN Index Algorithms" \
              --body "$BODY" \
              --label "epic")
            NUMBER=$(echo "$URL" | grep -oE '[0-9]+$')
            echo "Created Epic 3: #$NUMBER"
            PARENT=${{ steps.parent.outputs.parent_number }}
            if [ "$PARENT" != "0" ] && [ -n "$PARENT" ]; then
              CHILD_NUM="$NUMBER"
              gh api --method POST \
                "/repos/$REPO/issues/$PARENT/sub-issues" \
                -f sub_issue_id="$CHILD_NUM" 2>/dev/null || true
            fi
          fi

      - name: Create Epic 4 ŌĆö Shard Cache and Storage Layer
        id: epic4
        run: |
          BODY=$(cat <<'ISSUE_BODY'
          ## Epic 4 ŌĆö Shard Cache and Storage Layer

          **Goal:** Simulate the object storage + cache architecture found in production vector systems.

          ---

          ### Task 4.1 ŌĆö Storage abstraction

          Extend the existing `ObjectStore` trait with a named `StorageBackend` and add
          an S3-compatible stub.

          **Relevant code:**
