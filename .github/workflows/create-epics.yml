          ```bash
          shardlake build-index \
            --dataset-version ds-v1 \
            --index-version idx-v1 \
            --parallel \
            --num-workers 4 \
            --algorithm ivfpq
          ```

          **Acceptance criteria:**
          - [ ] `--parallel` flag triggers distributed build flow
          - [ ] Progress bar or structured log for each shard's build status
          - [ ] Build duration written to index manifest
          - [ ] `--dry-run` flag prints build plan without executing
          ISSUE_BODY
          )
