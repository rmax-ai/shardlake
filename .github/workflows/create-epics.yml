          ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöś
          ```

          ### Related files

          - `crates/shardlake-manifest/` ŌĆö manifest schema and validation
          - `crates/shardlake-index/` ŌĆö ANN index builder and searcher
          - `crates/shardlake-storage/` ŌĆö storage backend abstraction
          - `crates/shardlake-serve/` ŌĆö HTTP query server
          - `crates/shardlake-bench/` ŌĆö benchmarking harness
          - `crates/shardlake-cli/` ŌĆö command-line interface
